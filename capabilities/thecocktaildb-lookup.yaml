naftiko: 1.0.0-alpha2
info:
  label: TheCocktailDB API — Lookup
  description: 'TheCocktailDB API — Lookup. 2 operations. Lead operation: TheCocktailDB Lookup Cocktail or Ingredient by ID.
    Self-contained Naftiko capability covering one Thecocktaildb business surface.'
  tags:
  - Thecocktaildb
  - Lookup
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    THECOCKTAILDB_API_KEY: THECOCKTAILDB_API_KEY
capability:
  consumes:
  - type: http
    namespace: thecocktaildb-lookup
    baseUri: https://www.thecocktaildb.com/api/json/v1/1
    description: TheCocktailDB API — Lookup business capability. Self-contained, no shared references.
    resources:
    - name: lookup.php
      path: /lookup.php
      operations:
      - name: lookupbyid
        method: GET
        description: TheCocktailDB Lookup Cocktail or Ingredient by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: i
          in: query
          type: string
          description: Cocktail ID to look up
        - name: iid
          in: query
          type: string
          description: Ingredient ID to look up
    - name: random.php
      path: /random.php
      operations:
      - name: getrandomcocktail
        method: GET
        description: TheCocktailDB Get a Random Cocktail
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: thecocktaildb-lookup-rest
    port: 8080
    description: REST adapter for TheCocktailDB API — Lookup. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/lookup-php
      name: lookup-php
      description: REST surface for lookup.php.
      operations:
      - method: GET
        name: lookupbyid
        description: TheCocktailDB Lookup Cocktail or Ingredient by ID
        call: thecocktaildb-lookup.lookupbyid
        with:
          i: rest.i
          iid: rest.iid
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/random-php
      name: random-php
      description: REST surface for random.php.
      operations:
      - method: GET
        name: getrandomcocktail
        description: TheCocktailDB Get a Random Cocktail
        call: thecocktaildb-lookup.getrandomcocktail
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: thecocktaildb-lookup-mcp
    port: 9090
    transport: http
    description: MCP adapter for TheCocktailDB API — Lookup. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: thecocktaildb-lookup-cocktail-ingredient-id
      description: TheCocktailDB Lookup Cocktail or Ingredient by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: thecocktaildb-lookup.lookupbyid
      with:
        i: tools.i
        iid: tools.iid
      outputParameters:
      - type: object
        mapping: $.
    - name: thecocktaildb-get-random-cocktail
      description: TheCocktailDB Get a Random Cocktail
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: thecocktaildb-lookup.getrandomcocktail
      outputParameters:
      - type: object
        mapping: $.
