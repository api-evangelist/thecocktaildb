naftiko: "1.0.0-alpha1"

info:
  label: "TheCocktailDB API"
  description: "Open crowd-sourced cocktail and drinks database with search, lookup, and filter capabilities."
  tags:
    - Cocktails
    - Drinks
    - Recipes
    - Food And Beverage
  created: "2026-05-03"
  modified: "2026-05-03"

binds: []

capability:
  consumes:
    - type: http
      namespace: cocktaildb
      baseUri: https://www.thecocktaildb.com/api/json/v1/1
      description: "Open cocktail and drinks database API"
      resources:
        - name: search
          path: /search.php
          description: "Search cocktails by name or first letter, or search ingredients"
          operations:
            - name: search-cocktails
              method: GET
              description: "Search cocktails by name or first letter"
              inputParameters:
                - name: s
                  in: query
                  type: string
                  required: false
                  description: "Cocktail name to search"
                - name: f
                  in: query
                  type: string
                  required: false
                  description: "First letter to browse alphabetically"
                - name: i
                  in: query
                  type: string
                  required: false
                  description: "Ingredient name to search"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: lookup
          path: /lookup.php
          description: "Look up a cocktail or ingredient by ID"
          operations:
            - name: lookup-by-id
              method: GET
              description: "Retrieve full cocktail or ingredient details by ID"
              inputParameters:
                - name: i
                  in: query
                  type: string
                  required: false
                  description: "Cocktail ID"
                - name: iid
                  in: query
                  type: string
                  required: false
                  description: "Ingredient ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: random
          path: /random.php
          description: "Get a random cocktail"
          operations:
            - name: get-random-cocktail
              method: GET
              description: "Retrieve a single random cocktail with full details"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: filter
          path: /filter.php
          description: "Filter cocktails by ingredient, alcoholic status, category, or glass type"
          operations:
            - name: filter-cocktails
              method: GET
              description: "Filter cocktails by various attributes"
              inputParameters:
                - name: i
                  in: query
                  type: string
                  required: false
                  description: "Filter by ingredient"
                - name: a
                  in: query
                  type: string
                  required: false
                  description: "Filter by alcoholic status"
                - name: c
                  in: query
                  type: string
                  required: false
                  description: "Filter by category"
                - name: g
                  in: query
                  type: string
                  required: false
                  description: "Filter by glass type"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: list
          path: /list.php
          description: "List available categories, glasses, ingredients, or alcoholic filters"
          operations:
            - name: list-filter-values
              method: GET
              description: "List all available filter values"
              inputParameters:
                - name: c
                  in: query
                  type: string
                  required: false
                  description: "Set to 'list' for categories"
                - name: g
                  in: query
                  type: string
                  required: false
                  description: "Set to 'list' for glass types"
                - name: i
                  in: query
                  type: string
                  required: false
                  description: "Set to 'list' for ingredients"
                - name: a
                  in: query
                  type: string
                  required: false
                  description: "Set to 'list' for alcoholic filters"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: cocktaildb-rest
      resources:
        - path: /v1/cocktails
          name: cocktails
          operations:
            - method: GET
              name: search-cocktails
              description: "Search cocktails by name"
              call: "cocktaildb.search-cocktails"
              with:
                s: "rest.s"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/cocktails/{id}
          name: cocktail-detail
          operations:
            - method: GET
              name: lookup-cocktail
              description: "Look up a cocktail by ID"
              call: "cocktaildb.lookup-by-id"
              with:
                i: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: cocktaildb-mcp
      transport: http
      tools:
        - name: search-cocktails
          description: "Search cocktails by name or first letter"
          hints:
            readOnly: true
            openWorld: true
          call: "cocktaildb.search-cocktails"
          with:
            s: "tools.s"
          outputParameters:
            - type: object
              mapping: "$."
        - name: lookup-cocktail-by-id
          description: "Look up full cocktail details by ID"
          hints:
            readOnly: true
            openWorld: true
          call: "cocktaildb.lookup-by-id"
          with:
            i: "tools.i"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-random-cocktail
          description: "Get a random cocktail recipe"
          hints:
            readOnly: true
            openWorld: true
          call: "cocktaildb.get-random-cocktail"
          outputParameters:
            - type: object
              mapping: "$."
        - name: filter-cocktails
          description: "Filter cocktails by ingredient, category, glass type, or alcoholic status"
          hints:
            readOnly: true
            openWorld: true
          call: "cocktaildb.filter-cocktails"
          with:
            i: "tools.i"
            c: "tools.c"
            g: "tools.g"
            a: "tools.a"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-categories
          description: "List all available drink categories"
          hints:
            readOnly: true
            openWorld: true
          call: "cocktaildb.list-filter-values"
          with:
            c: list
          outputParameters:
            - type: object
              mapping: "$."
