naftiko: 1.0.0-alpha2
info:
  label: TheCocktailDB API — Filter
  description: 'TheCocktailDB API — Filter. 1 operations. Lead operation: TheCocktailDB Filter Cocktails by Attribute. Self-contained
    Naftiko capability covering one Thecocktaildb business surface.'
  tags:
  - Thecocktaildb
  - Filter
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    THECOCKTAILDB_API_KEY: THECOCKTAILDB_API_KEY
capability:
  consumes:
  - type: http
    namespace: thecocktaildb-filter
    baseUri: https://www.thecocktaildb.com/api/json/v1/1
    description: TheCocktailDB API — Filter business capability. Self-contained, no shared references.
    resources:
    - name: filter.php
      path: /filter.php
      operations:
      - name: filtercocktails
        method: GET
        description: TheCocktailDB Filter Cocktails by Attribute
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: i
          in: query
          type: string
          description: Filter by ingredient name (e.g. vodka)
        - name: a
          in: query
          type: string
          description: Filter by alcoholic status
        - name: c
          in: query
          type: string
          description: Filter by category
        - name: g
          in: query
          type: string
          description: Filter by glass type
  exposes:
  - type: rest
    namespace: thecocktaildb-filter-rest
    port: 8080
    description: REST adapter for TheCocktailDB API — Filter. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/filter-php
      name: filter-php
      description: REST surface for filter.php.
      operations:
      - method: GET
        name: filtercocktails
        description: TheCocktailDB Filter Cocktails by Attribute
        call: thecocktaildb-filter.filtercocktails
        with:
          i: rest.i
          a: rest.a
          c: rest.c
          g: rest.g
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: thecocktaildb-filter-mcp
    port: 9090
    transport: http
    description: MCP adapter for TheCocktailDB API — Filter. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: thecocktaildb-filter-cocktails-attribute
      description: TheCocktailDB Filter Cocktails by Attribute
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: thecocktaildb-filter.filtercocktails
      with:
        i: tools.i
        a: tools.a
        c: tools.c
        g: tools.g
      outputParameters:
      - type: object
        mapping: $.
