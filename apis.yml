apis:
  - aid: thecocktaildb:thecocktaildb
    name: TheCocktailDB API
    description: >-
      Free cocktail and drinks recipe database with a REST API providing drink recipes, ingredients, glass types,
      categories, and cocktail images. Search cocktails by name, ingredient, category, glass type, or alcoholic
      content. Look up full recipes with ingredients, measurements, instructions, and images. Free tier available
      with public test API key. Production keys available to Patreon supporters.
